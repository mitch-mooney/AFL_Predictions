name: run-pipeline

# Weekly run of the full prediction pipeline (odds -> features -> Keras predict ->
# store), committing the updated CSVs back to the repo.
#
# Setup required once: add an ODD_API_KEY repository secret (Settings -> Secrets
# and variables -> Actions); the run step maps it to the ODDS_API_KEY env var the
# pipeline reads. Without it the pipeline still runs and falls back to the betless
# model (current-round odds are simply unavailable).
#
# Heaviest/riskiest step is installing TensorFlow and loading the committed Keras
# model — if the CI TF version can't load the saved model, that step needs
# iteration (pin a compatible tensorflow version in install_keras()).

on:
  schedule:
    - cron: '0 20 * * 3'   # Wed 20:00 UTC = Thu 06:00 AEST, before the round
  workflow_dispatch:

permissions:
  contents: write          # to commit the updated CSVs back to main

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "tidyverse", "fitzRoy", "data.table", "PlayerRatings", "plotly",
            "lubridate", "reshape2", "ggpmisc", "magrittr", "keras", "tensorflow",
            "ggpubr", "reactable", "htmltools", "sparkline", "jsonlite", "knitr"
          ))

      - name: Install TensorFlow (CPU)
        shell: Rscript {0}
        run: keras::install_keras()

      - name: Run pipeline
        env:
          # secret is named ODD_API_KEY in the repo; the pipeline reads ODDS_API_KEY
          ODDS_API_KEY: ${{ secrets.ODD_API_KEY }}
        # Neutralise the headless reactable render (browseURL no-op) so it can't
        # fail the run after the CSVs are written.
        run: Rscript -e 'options(browser = function(url) invisible(NULL)); source("run_pipeline.R")'

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csv_files/round_predictions.csv csv_files/Team_Ratings.csv \
                  csv_files/AFLstats.csv csv_files/betting_odds_round.csv
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Scheduled round predictions [skip ci]"
            git push
          fi
